<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldMap Globe</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #111827;
        font-family: system-ui, sans-serif;
      }

      #globe {
        width: 680px;
        height: 680px;
        border-radius: 16px;
        background: #F6F8FD;
        overflow: hidden;
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5);
      }

      @media (max-width: 720px) {
        #globe { width: 94vw; height: 94vw; }
      }
    </style>
  </head>
  <body>
    <div id="globe"></div>

    <script src="./worldmap.umd.js"></script>
    <script>
      Promise.all([
        fetch('./data/big-cities.json').then(r => r.json()),
        fetch('./data/small-cities.json').then(r => r.json()),
        fetch('./data/countries.json').then(r => r.json()),
      ]).then(([bigCities, smallCities, activeCountries]) => {
        WorldMap.initWorldMap({
          container: document.getElementById('globe'),
          activeCountries,
          bigCities,
          smallCities,
        });
      });
    </script>
  </body>
</html>
