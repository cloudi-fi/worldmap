<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloudi-Fi World Map</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        transition: background 0.3s;
      }

      body.theme-light { background: #F4F7FC; }
      body.theme-dark  { background: #162a63; }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }

      #theme-toggle {
        padding: 5px 14px;
        border-radius: 99px;
        border: 1.5px solid currentColor;
        background: transparent;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: color 0.3s, border-color 0.3s;
      }
      body.theme-light #theme-toggle { color: #8898C8; }
      body.theme-dark  #theme-toggle { color: #466cd6; }

      .continents {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .continents button {
        padding: 5px 16px;
        border-radius: 99px;
        border: none;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
      }
      body.theme-light .continents button { background: #E4EAF8; color: #3F6ED2; }
      body.theme-dark  .continents button { background: #1e3a7a; color: #7da4f5; }
      body.theme-light .continents button:hover { background: #C2D0F0; }
      body.theme-dark  .continents button:hover { background: #2546a6; color: #fff; }

      /* The globe container – the globe canvas will fill this */
      #globe {
        width: 1200px;
        height: 600px;
        border-radius: 16px;
        overflow: hidden;
        transition: background 0.3s;
      }
      body.theme-light #globe { background: #F6F8FD; }
      body.theme-dark  #globe { background: #162a63; }

      @media (max-width: 720px) {
        #globe { width: 94vw; height: 94vw; }
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button id="theme-toggle" type="button">Dark</button>
    </div>
    <nav class="continents">
      <button data-lat="29.727"  data-lng="4.840"    data-alt="0.897" data-index="0">Europe</button>
      <button data-lat="20.898"  data-lng="-106.276" data-alt="1.166" data-index="1">North America</button>
      <button data-lat="-33.929" data-lng="-68.950"  data-alt="1.357" data-index="2">South America</button>
      <button data-lat="-17.046" data-lng="17.292"   data-alt="1.254" data-index="3">Africa</button>
      <button data-lat="-31.561" data-lng="140.528"  data-alt="1.094" data-index="4">Oceania</button>
      <button data-lat="11.562"  data-lng="94.406"   data-alt="1.038" data-index="5">Asia</button>
    </nav>
    <div id="globe"></div>

    <script src="./worldmap.umd.js"></script>
    <script>
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      let currentTheme = mq.matches ? 'dark' : 'light';
      let currentMap   = null;
      let cachedData   = null;

      async function applyTheme(theme) {
        document.body.className = `theme-${theme}`;
        document.getElementById('theme-toggle').textContent =
          theme === 'dark' ? '☀ Light' : '🌙 Dark';

        if (currentMap) { currentMap.destroy(); currentMap = null; }

        if (!cachedData) {
          cachedData = await Promise.all([
            fetch('./data/big-cities.json').then(r => r.json()),
            fetch('./data/small-cities.json').then(r => r.json()),
            fetch('./data/countries.json').then(r => r.json()),
          ]);
        }
        const [bigCities, smallCities, activeCountries] = cachedData;

        currentMap = await WorldMap.initWorldMap({
          container: document.getElementById('globe'),
          activeCountries,
          bigCities,
          smallCities,
          theme,
        });
      }

      document.querySelector('.continents').addEventListener('click', e => {
        const btn = e.target.closest('button[data-lat]');
        if (!btn || !currentMap) return;
        currentMap.flyTo({
          lat:      parseFloat(btn.dataset.lat),
          lng:      parseFloat(btn.dataset.lng),
          altitude: parseFloat(btn.dataset.alt),
        }, parseInt(btn.dataset.index, 10));
      });

      document.getElementById('theme-toggle').addEventListener('click', () => {
        currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
        applyTheme(currentTheme);
      });

      mq.addEventListener('change', e => {
        currentTheme = e.matches ? 'dark' : 'light';
        applyTheme(currentTheme);
      });

      applyTheme(currentTheme);
    </script>
  </body>
</html>
